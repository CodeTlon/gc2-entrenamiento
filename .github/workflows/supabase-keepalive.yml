name: Supabase keep-alive

# Evita que el proyecto Supabase (free tier) se pause por 7 dias sin actividad.
# Pinguea la REST API de produccion. Corre cada 3 dias (margen dentro de los 7).
# Requiere los secrets del repo: SUPABASE_URL y SUPABASE_ANON_KEY (valores de PRODUCCION).

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -fsS "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
